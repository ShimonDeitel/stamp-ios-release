name: Stamp
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Stamp:
    type: application
    platform: iOS
    sources:
      - path: Stamp
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stamp
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Stamp/Info.plist
        CODE_SIGN_ENTITLEMENTS: Stamp/Stamp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StampTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StampTests
      - path: Stamp.storekit
    dependencies:
      - target: Stamp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stamp.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Stamp:
    build:
      targets:
        Stamp: all
        StampTests: [test]
    run:
      config: Debug
      storeKitConfiguration: Stamp.storekit
    test:
      config: Debug
      storeKitConfiguration: Stamp.storekit
      targets:
        - StampTests
    archive:
      config: Release
